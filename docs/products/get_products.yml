tags:
  - Products

summary: Get all products

description: |
  Retrieves all products belonging to the authenticated user.

  Features:
  - JWT Authentication required
  - Pagination
  - Sorting
  - Ascending/Descending ordering

security:
  - Bearer: []

produces:
  - application/json

parameters:
  - in: query
    name: page
    type: integer
    required: false
    default: 1
    description: Page number (must be greater than 0)
    example: 1

  - in: query
    name: sort
    type: string
    required: false
    default: id
    enum:
      - id
      - name
      - price
      - quantity
      - created_at
      - updated_at
    description: Field used to sort products

  - in: query
    name: order
    type: string
    required: false
    default: asc
    enum:
      - asc
      - desc
    description: Sort order

responses:
  200:
    description: Products retrieved successfully
    schema:
      type: array
      items:
        type: object
        properties:
          id:
            type: integer
            example: 1

          name:
            type: string
            example: iPhone 16 Pro

          description:
            type: string
            example: Apple flagship smartphone

          price:
            type: number
            format: float
            example: 99999.99

          quantity:
            type: integer
            example: 15

          user_id:
            type: integer
            example: 3

          created_at:
            type: string
            format: date-time
            example: "2026-07-18T10:30:00"

          updated_at:
            type: string
            format: date-time
            example: "2026-07-18T10:30:00"

  400:
    description: Invalid pagination or sorting parameters
    schema:
      type: object
      properties:
        message:
          type: string
          example: Invalid sort field

  401:
    description: Authentication required

  500:
    description: Database error
    schema:
      type: object
      properties:
        message:
          type: string
          example: Database error occurred