tags:
  - Authentication

summary: User login

description: |
  Authenticates a user using email and password.

  On successful authentication, returns:
  - Access Token
  - Refresh Token
  - User details

consumes:
  - application/json

produces:
  - application/json

parameters:
  - in: body
    name: body
    required: true
    description: User login credentials
    schema:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: ali@example.com

        password:
          type: string
          format: password
          example: Password@123

responses:
  200:
    description: Login successful
    schema:
      type: object
      properties:
        message:
          type: string
          example: Login successful

        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIs...

        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIs...

        name:
          type: string
          example: Ali Abbas

        email:
          type: string
          example: ali@example.com

        phone_number:
          type: string
          example: "9876543210"

        role:
          type: string
          example: admin

  400:
    description: Validation error
    schema:
      type: object
      properties:
        message:
          type: string
          example: Email is required

  401:
    description: Invalid credentials
    schema:
      type: object
      properties:
        message:
          type: string
          example: Invalid email or password

  500:
    description: Database error
    schema:
      type: object
      properties:
        message:
          type: string
          example: Database error occurred