tags:
  - Users

summary: Delete a user

description: |
  Deletes an existing user from the database using the user's unique ID.

produces:
  - application/json

parameters:
  - in: path
    name: user_id
    type: integer
    required: true
    description: ID of the user to delete
    example: 1

responses:
  200:
    description: User deleted successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: User has been deleted

  404:
    description: User not found
    schema:
      type: object
      properties:
        message:
          type: string
          example: User not found or not deleted

  500:
    description: Database error
    schema:
      type: object
      properties:
        message:
          type: string
          example: Database error occurred