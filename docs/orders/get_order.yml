tags:
  - Orders

summary: Get an order by ID

description: |
  Retrieves detailed information about a specific order belonging to the authenticated user.

  The response includes:
  - Order details
  - Customer name
  - Ordered products
  - Quantity of each product
  - Price at purchase
  - Item totals
  - Grand total

security:
  - Bearer: []

produces:
  - application/json

parameters:
  - in: path
    name: id
    type: integer
    required: true
    description: ID of the order
    example: 15

responses:
  200:
    description: Order retrieved successfully
    schema:
      type: object
      properties:
        order_id:
          type: integer
          example: 15

        status:
          type: string
          example: pending

        created_at:
          type: string
          format: date-time
          example: "2026-07-18T14:30:00"

        customer:
          type: string
          example: Ali Abbas

        items:
          type: array
          items:
            type: object
            properties:
              product_name:
                type: string
                example: iPhone 16 Pro

              quantity:
                type: integer
                example: 2

              price:
                type: number
                format: float
                example: 99999.99

              item_total:
                type: number
                format: float
                example: 199999.98

        total:
          type: number
          format: float
          example: 219999.98

  401:
    description: Authentication required

  404:
    description: Order not found
    schema:
      type: object
      properties:
        message:
          type: string
          example: Order not found

  500:
    description: Database error
    schema:
      type: object
      properties:
        message:
          type: string
          example: DATABASE ERROR OCCURED