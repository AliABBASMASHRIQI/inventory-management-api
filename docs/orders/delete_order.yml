tags:
  - Orders

summary: Delete an order

description: |
  Deletes an order belonging to the authenticated user.

  **Authentication Required**

  Only the owner of the order can delete it.

security:
  - Bearer: []

produces:
  - application/json

parameters:
  - in: path
    name: id
    type: integer
    required: true
    description: ID of the order to delete
    example: 15

responses:
  200:
    description: Order deleted successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: Order deleted

  401:
    description: Authentication required

  404:
    description: Order not found
    schema:
      type: object
      properties:
        message:
          type: string
          example: Order not found

  500:
    description: Database error
    schema:
      type: object
      properties:
        message:
          type: string
          example: Database error occurred